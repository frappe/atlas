<!-- Host page for the user-facing SPA at /dashboard.

     The actual markup is the Vite-built index.html (with hashed asset
     references + Frappe boot data), injected by dashboard.py at render time
     from atlas/public/frontend/index.html. This file is only the fallback
     shown when no build exists yet (e.g. before `bench build --app atlas`):
     it tells the operator to build. See spec/11-user-ui.md. -->
{% if spa_index %}{{ spa_index | safe }}{% else %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Atlas</title>
  </head>
  <body>
    <p>The Atlas dashboard has not been built yet. Run
      <code>bench build --app atlas</code>.</p>
  </body>
</html>
{% endif %}
